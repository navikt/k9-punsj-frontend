name: Cypress-tester

on:
    workflow_call:
        secrets:
            READER_TOKEN:
                required: true

permissions:
    contents: read

jobs:
    test:
        name: Cypress-tester
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                ci_index: [0, 1, 2, 3]
                ci_total: [4]
        steps:
            - name: Hente kode
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup .yarnrc.yml
              run: |
                  yarn config set npmScopes.navikt.npmRegistryServer "https://npm.pkg.github.com"
                  yarn config set npmScopes.navikt.npmAlwaysAuth true
                  yarn config set npmScopes.navikt.npmAuthToken $NPM_AUTH_TOKEN
              env:
                  NPM_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

            - name: Sette opp Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 20.x
                  registry-url: https://npm.pkg.github.com/
                  scope: '@navikt'

            - name: Installere moduler
              run: yarn install --immutable
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

            - name: Installere Cypress
              run: npx cypress install

            - name: Start E2E-server
              uses: cypress-io/github-action@4c06c48f3ffea349b7189aa06dfcda47a9fa7b92 # v7.1.8
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
              with:
                  start: yarn start:e2e
                  wait-on: 'http://localhost:8080'
                  wait-on-timeout: 60
                  runTests: false

            - name: Kjør Cypress tester
              run: yarn cypress run --spec "$(node split.mjs)"
              env:
                  CI_TOTAL: ${{ matrix.ci_total }}
                  CI_INDEX: ${{ matrix.ci_index }}
                  CI: 1
                  TERM: xterm
                  DBUS_SESSION_BUS_ADDRESS: /dev/null

name: Deploy til preprod gcp
on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    lint:
        uses: ./.github/workflows/lint.yml
        secrets:
            READER_TOKEN: ${{ secrets.READER_TOKEN }}
    test:
        uses: ./.github/workflows/test.yml
        secrets:
            READER_TOKEN: ${{ secrets.READER_TOKEN }}
    build:
        uses: ./.github/workflows/build.yml
        secrets:
            READER_TOKEN: ${{ secrets.READER_TOKEN }}
    deploy-dev-gcp:
        name: Deploye til DEV GCP
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read
            id-token: write
        needs: [lint, test, build]
        steps:
            - name: Hente kode
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
            - name: Setup .yarnrc.yml
              run: |
                  yarn config set npmScopes.navikt.npmRegistryServer "https://npm.pkg.github.com"
                  yarn config set npmScopes.navikt.npmAlwaysAuth true
                  yarn config set npmScopes.navikt.npmAuthToken $NPM_AUTH_TOKEN
              env:
                  NPM_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}
            - name: Sette opp Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: 20.x
                  registry-url: https://npm.pkg.github.com/
                  scope: '@navikt'

            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: dist
                  path: ./dist

            - name: Installere moduler
              run: yarn workspaces focus @k9-punsj-frontend/server --production
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

            - uses: nais/docker-build-push@751a312f0803eb96a05a41fadf51be19b7be362c # v0
              id: docker-push
              with:
                  tag: 'latest'
                  team: k9saksbehandling
                  project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
                  identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
                  pull: true
                  build_args: |
                    CACHEBUST=${{ github.run_id }}
                  cache_from: type=gha
                  cache_to: type=gha,mode=max

            - name: Set image
              run: echo "IMAGE=${{steps.docker-push.outputs.image}}" >> $GITHUB_ENV

            - name: Deploye til dev
              uses: nais/deploy/actions/deploy@d57354b433c8d6847ab092467d9fe976a3d008aa # v2
              env:
                  CLUSTER: dev-gcp
                  RESOURCE: nais/k9-punsj-frontend.yml
                  VARS: nais/dev-gcp.yml
